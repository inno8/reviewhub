version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reviewhub
      POSTGRES_USER: reviewhub
      POSTGRES_PASSWORD: ${DB_PASSWORD:-reviewhub_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reviewhub"]
      interval: 5s
      timeout: 3s
      retries: 5

  django:
    build: ./django_backend
    environment:
      DATABASE_URL: postgres://reviewhub:${DB_PASSWORD:-reviewhub_dev}@db:5432/reviewhub
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: ${DEBUG:-false}
      ALLOWED_HOSTS: "*"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:80,http://frontend
      # ai-engine reachable via the compose-internal hostname. Used by
      # rubric_grader, batch.views, and the per-commit Code Review
      # forwarder in grading.webhooks. Without this, calls fall back to
      # localhost:8001 which from inside the django container is itself.
      FASTAPI_URL: http://ai_engine:8001
      # GitHub App credentials. Used by Django to mint installation
      # JWTs (signed with PRIVATE_KEY), exchange them for short-lived
      # installation tokens, clone repos, and post PR comments under
      # the App's identity. ai-engine receives the short-lived token
      # via Django's request payload — it doesn't need these directly.
      # Webhook signature verification reuses GITHUB_WEBHOOK_SECRET.
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_CLIENT_ID: ${GITHUB_APP_CLIENT_ID:-}
      GITHUB_APP_CLIENT_SECRET: ${GITHUB_APP_CLIENT_SECRET:-}
      GITHUB_APP_SLUG: ${GITHUB_APP_SLUG:-leera}
      GITHUB_APP_PRIVATE_KEY_PATH: ${GITHUB_APP_PRIVATE_KEY_PATH:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # Mount the host secrets/ folder read-only so the App private key
    # is reachable at GITHUB_APP_PRIVATE_KEY_PATH=/app/secrets/leera.pem
    # without baking it into the image. Keeps the .pem out of git and
    # out of the image layers. Skip this mount if you're using the
    # inline GITHUB_APP_PRIVATE_KEY env var instead.
    volumes:
      - ./secrets:/app/secrets:ro
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn reviewhub.wsgi:application --bind 0.0.0.0:8000 --workers 3"

  ai_engine:
    build: ./ai_engine
    environment:
      BACKEND_API_URL: http://django:8000
      BACKEND_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4-turbo}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GIT_CACHE_DIR: /repos
      OPENCLAW_ENABLED: "true"
    volumes:
      - git_cache:/repos
    ports:
      - "8001:8001"
    depends_on:
      - django

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    ports:
      - "80:80"
    depends_on:
      - django
      - ai_engine

volumes:
  pgdata:
  git_cache:
