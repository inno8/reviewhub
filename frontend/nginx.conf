# nginx config for the LEERA frontend container.
#
# This file is processed as an envsubst template by the nginx:alpine
# entrypoint at container start. ${DOMAIN_NAME} is filled from the
# environment variable of the same name (set in docker-compose.prod.yml
# from the .env file). To switch domains, change DOMAIN_NAME and
# `docker compose up -d`; no image rebuild needed.
#
# Two server blocks:
#
#   :80  — redirects to HTTPS, EXCEPT the ACME challenge path which
#          stays plain HTTP so Let's Encrypt's HTTP-01 validator can
#          read the renewal token.
#
#   :443 — TLS terminated. Serves the static Vue bundle and proxies
#          /api/ → django and /api/ai/ → ai-engine.
#
# Cert files come from the certbot-conf volume (mounted at
# /etc/letsencrypt) which is also written by the certbot container
# during renewals. nginx reloads every 12h (see frontend service
# command in docker-compose.prod.yml) to pick up renewed certs
# without downtime.

# ─────────────────────────────────────────────────────────────────────
# HTTP → HTTPS redirect + ACME challenge passthrough
# ─────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN_NAME} www.${DOMAIN_NAME};

    # Let's Encrypt HTTP-01 challenge. Must stay reachable on plain
    # HTTP — certbot writes tokens here during renewal and the LE
    # validator hits them via the public domain.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────────
# HTTPS — main server
# ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ${DOMAIN_NAME} www.${DOMAIN_NAME};

    # Cert paths come from the certbot-conf shared volume. The dummy
    # cert from init-letsencrypt.sh lives at the same path during
    # bootstrap so nginx can start before the real cert lands.
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN_NAME}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN_NAME}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS — force HTTPS for 6 months once the client has visited via
    # HTTPS at least once. Only enable after you've confirmed TLS is
    # solid; once shipped, browsers cache this for the duration.
    add_header Strict-Transport-Security "max-age=15768000" always;

    # Hardening
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets — long cache via Vite hashes
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Webhook payloads from GitHub can be ~25 KB; default
        # client_max_body_size is 1m which is fine but bumping
        # explicitly so a payload spike never silently rejects.
        client_max_body_size 4m;
    }

    location /api/ai/ {
        # Service name in docker-compose.prod.yml is "ai-engine" (hyphen),
        # not "ai_engine" (underscore). Docker DNS resolves exact names.
        proxy_pass http://ai-engine:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
