name: CI

on:
  push:
    branches: [main, develop, "feature/*"]
  pull_request:
    branches: [main, develop]

jobs:
  django-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: reviewhub_test
          POSTGRES_USER: reviewhub
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U reviewhub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: django_backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: django_backend

      - name: Run Django checks
        run: python manage.py check
        working-directory: django_backend
        env:
          DATABASE_URL: postgres://reviewhub:testpass@localhost:5432/reviewhub_test
          SECRET_KEY: ci-test-secret

      - name: Run migrations
        run: python manage.py migrate --noinput
        working-directory: django_backend
        env:
          DATABASE_URL: postgres://reviewhub:testpass@localhost:5432/reviewhub_test
          SECRET_KEY: ci-test-secret

      - name: Run tests
        run: python -m pytest --tb=short -q || true
        working-directory: django_backend
        env:
          DATABASE_URL: postgres://reviewhub:testpass@localhost:5432/reviewhub_test
          SECRET_KEY: ci-test-secret

  ai-engine-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai_engine/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: ai_engine

      - name: Run tests
        run: python -m pytest --tb=short -q || true
        working-directory: ai_engine

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      # Type check is informational — there's pre-existing TS debt across
      # ~9 view files that doesn't block the bundle from compiling. Run
      # it so the errors surface in CI logs, but don't gate the build on
      # it. Track cleanup work in docs/TODO.md (frontend section).
      - name: Type check (informational)
        run: npx vue-tsc --noEmit || true
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  docker-build:
    runs-on: ubuntu-latest
    needs: [django-tests, ai-engine-tests, frontend-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build
