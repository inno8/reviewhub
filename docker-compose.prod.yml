version: '3.8'

# LEERA production stack — Nakijken Copilot v1 dogfood.
#
# Five services, two volumes, two named networks (default + cert-share).
# TLS is terminated by the frontend nginx container; Let's Encrypt
# certificates are obtained + renewed by the certbot service. See
# scripts/init-letsencrypt.sh for the first-time bootstrap (chicken-
# and-egg: nginx needs a cert to start; certbot needs nginx running
# to serve the ACME challenge).

services:
  django:
    build:
      context: ./django_backend
      dockerfile: Dockerfile
    environment:
      - DEBUG=false
      # DATABASE_URL composed from the postgres vars below. Override
      # by setting DATABASE_URL directly in .env to point at an
      # external managed Postgres (RDS / Supabase / Neon / etc.).
      # POSTGRES_HOST defaults to "db" (the in-compose service name);
      # set it in .env when pointing at an external host.
      - DATABASE_URL=${DATABASE_URL:-postgres://${POSTGRES_USER:-reviewhub}:${DB_PASSWORD}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-reviewhub}}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - FASTAPI_URL=http://ai-engine:8001
      - WEBHOOK_BASE_URL=${WEBHOOK_BASE_URL}
      - EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      # TLS true for port 587 (Gmail) + port 2525 (Brevo, SendGrid).
      # Default true so existing deploys keep working; override in .env
      # if your provider uses implicit SSL on 465 (set EMAIL_USE_TLS=false
      # and configure EMAIL_USE_SSL separately if needed).
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-true}
      - EMAIL_FROM=${EMAIL_FROM}
      - DEFAULT_FROM_EMAIL=${EMAIL_FROM}
      # Resend SDK path (preferred over SMTP). users/emails.py:
      #   if RESEND_API_KEY -> use Resend SDK
      #   else              -> Django SMTP
      # Without this line the Resend key never reaches the container,
      # so the code silently falls through to SMTP (which may have
      # empty creds if the operator chose Resend), and nothing sends.
      - RESEND_API_KEY=${RESEND_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
      # NOTE: Django does NOT receive LLM_* env vars. Per the LEERA
      # business model, the platform LLM key is configured by the
      # superadmin via Settings → LLM Config and stored encrypted in
      # the LLMConfiguration DB table. ai-engine still gets LLM env
      # vars below — it uses PR_LLM_MODEL / COMMIT_LLM_MODEL for
      # per-task model tier routing. The api_key reaches ai-engine
      # via the request payload from Django, sourced from DB.
      # GitHub App credentials. Used by Django to:
      #  - mint installation JWTs (signed with PRIVATE_KEY)
      #  - exchange them for short-lived installation tokens
      #  - clone repos + post PR comments under the App's identity
      # ai-engine doesn't need these directly — it receives the
      # short-lived installation token via Django's request payload.
      # Webhook signature verification reuses GITHUB_WEBHOOK_SECRET.
      - GITHUB_APP_ID=${GITHUB_APP_ID:-}
      - GITHUB_APP_CLIENT_ID=${GITHUB_APP_CLIENT_ID:-}
      - GITHUB_APP_CLIENT_SECRET=${GITHUB_APP_CLIENT_SECRET:-}
      - GITHUB_APP_SLUG=${GITHUB_APP_SLUG:-leera}
      - GITHUB_APP_PRIVATE_KEY_PATH=${GITHUB_APP_PRIVATE_KEY_PATH:-}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY:-}
      # NOTE on the App private key:
      # The default deployment uses GITHUB_APP_PRIVATE_KEY (inline PEM
      # contents in .env, with \n escapes) — Option B from the example
      # file. Simpler, no compose edits, no host filesystem dependency.
      # If you'd rather mount the .pem as a file (Option A — better for
      # rotation), uncomment the volumes block below AND set
      # GITHUB_APP_PRIVATE_KEY_PATH=/run/secrets/github-app.pem in .env.
      # The host path /etc/leera/github-app.pem is a convention; change
      # to wherever you've placed the file. Container will fail to
      # start if the host path doesn't exist — that's by design (better
      # to fail loud than read a missing key at runtime).
      # volumes:
      #   - /etc/leera/github-app.pem:/run/secrets/github-app.pem:ro
    # No host port mapping — only reachable via the frontend nginx
    # reverse proxy (which terminates TLS). Comment back in for direct
    # debugging access if needed.
    expose:
      - "8000"
    depends_on:
      db:
        # Wait for Postgres to actually accept connections before
        # starting Django. Without this, `docker compose run django ...`
        # can race the db's first-boot initialization (~5-8 s on a
        # fresh pgdata volume) and fail with "connection refused".
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    restart: unless-stopped

  ai-engine:
    build:
      context: ./ai_engine
      dockerfile: Dockerfile
    environment:
      - DEBUG=false
      - BACKEND_API_URL=http://django:8000
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - GITLAB_WEBHOOK_SECRET=${GITLAB_WEBHOOK_SECRET}
      - GIT_CACHE_DIR=/data/repos
      # LLM credentials reach ai-engine via the request payload from
      # Django (sourced from LLMConfiguration in DB — see LEERA
      # business model in users/org_llm.py). LLM_API_KEY here is a
      # legacy fallback only; can be left empty in .env.
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-}
      # Two-tier model routing — ai-engine picks PR_LLM_MODEL for
      # full-PR rubric grading sessions (best quality) and
      # COMMIT_LLM_MODEL for commit-level inline reviews (cheap +
      # fast). Both must match LLM_PROVIDER's vendor.
      - PR_LLM_MODEL=${PR_LLM_MODEL:-}
      - COMMIT_LLM_MODEL=${COMMIT_LLM_MODEL:-}
    expose:
      - "8001"
    volumes:
      - ai-repos:/data/repos
    depends_on:
      - django
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-reviewhub}
      - POSTGRES_USER=${POSTGRES_USER:-reviewhub}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # Postgres reports "ready" only after first-boot init has finished
      # creating the role + DB and the listener is accepting TCP. Used
      # by django's `depends_on: db: condition: service_healthy` above
      # so the migrate step doesn't race the db boot.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reviewhub} -d ${POSTGRES_DB:-reviewhub}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      # nginx envsubst replaces ${DOMAIN_NAME} in default.conf.template
      # with this value at container start.
      - DOMAIN_NAME=${DOMAIN_NAME}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Shared with the certbot service — Let's Encrypt cert + key live here.
      - certbot-conf:/etc/letsencrypt:ro
      # Shared writable so certbot can drop the ACME-challenge files for
      # nginx to serve on /.well-known/acme-challenge/.
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      # nginx resolves proxy_pass hostnames at startup, not per-request.
      # If ai-engine isn't running when nginx parses the config, it fails
      # with "host not found in upstream" and frontend exits before
      # binding port 80. Both django and ai-engine must be present.
      - django
      - ai-engine
    restart: unless-stopped
    # Reload nginx every 12h so a renewed Let's Encrypt cert is picked
    # up without manual intervention. The trap on TERM lets Docker stop
    # the container cleanly.
    command: >
      /bin/sh -c "trap exit TERM;
                  while :; do sleep 12h & wait $${!}; nginx -s reload; done &
                  exec /docker-entrypoint.sh nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    depends_on:
      - frontend
    # Renew check every 12h (Let's Encrypt's recommended cadence;
    # only actually renews when within 30 days of expiry, no-op otherwise).
    # Deploy-hook reloads nginx in the frontend container so a freshly-
    # renewed cert is picked up immediately rather than waiting for the
    # frontend's 12h reload loop.
    entrypoint: >
      /bin/sh -c "trap exit TERM;
                  while :; do
                    certbot renew --webroot -w /var/www/certbot --quiet
                      --deploy-hook 'echo Cert renewed at $$(date -u +%FT%TZ)';
                    sleep 12h & wait $${!};
                  done"

volumes:
  pgdata:
  ai-repos:
  certbot-conf:
  certbot-webroot:
